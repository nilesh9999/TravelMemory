version: "3.9"
services:
  app:
    build: .
    container_name: travelmemory-backend-app
    env_file: .env
    networks:
      - travelmemory-backend-net
    volumes:
      - travelmemory-backend-logs:/usr/src/app/logs
    restart: unless-stopped
 
  nginx:
    image: nginx:alpine
    container_name: travelmemory-backend-nginx
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - travelmemory-backend-net
    restart: unless-stopped
 
networks:
  travelmemory-backend-net:
    driver: bridge
 
volumes:
  travelmemory-backend-logs:
